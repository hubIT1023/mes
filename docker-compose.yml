

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: hubit-web
    
    # 🔐 Network: Bind to localhost only — use reverse proxy for public access
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    
    # 🔐 Environment: Load .env + override sensitive values with secrets
    env_file:
      - path: .env
        required: true
    environment:
      DB_PASSWORD_FILE: /run/secrets/db_password
      PGADMIN_PASSWORD_FILE: /run/secrets/pgadmin_password
    
    # 🔐 Volumes: Minimal, explicit, no conflicts
    volumes:
      # Apache config (read-only)
      - ./apache/sites-available/hubit.conf:/etc/apache2/sites-available/hubit.conf:ro
      
      # Let's Encrypt certificates (read-only)
      - ./letsencrypt:/etc/letsencrypt:ro
      
      # Application code (read-only; deploy via CI/CD or bind-mount in dev only)
      - ./app:/var/www/html/app:ro
      - ./index.php:/var/www/html/index.php:ro
      - ./.htaccess:/var/www/html/.htaccess:ro
      
      # ✅ FIXED: Use named volume for logs (NOT tmpfs + volume conflict)
      - app_logs:/var/www/html/app/logs
    
    # 🔐 Security Hardening
    security_opt:
      - no-new-privileges:true
      # AppArmor: Only apply if profile exists (Linux-specific)
      # - apparmor=docker-default  # Uncomment if available on your host
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Required for binding to ports <1024
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/run:size=16m,mode=755
      # ✅ REMOVED: /var/www/html/app/logs (conflicts with named volume